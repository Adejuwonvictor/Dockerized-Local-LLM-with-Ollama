services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - ai-networks
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
  fastapi-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi-app
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate
      - MODEL_NAME=llama3.2:1b
    networks:
      - ai-networks
    depends_on:
      - ollama
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  ollama-models:
networks:
  ai-networks:
    driver: bridge
